<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Super Cordero — Deudores</title>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <main>
    <!-- Vista general: lista de deudores -->
    <div id="vista-lista">
      <h1>Deudores</h1>
      <div class="tarjeta">
        <div class="filtros">
          <input type="text" id="buscar-deudor" placeholder="Buscar cliente por nombre..." style="flex:1; min-width:200px;">
          <label style="margin:0; display:flex; align-items:center; gap:6px; cursor:pointer;">
            <input type="checkbox" id="solo-deudores" checked style="width:auto;">
            Solo los que deben
          </label>
          <button class="boton boton-morado" id="btn-nuevo-cliente">Nuevo cliente</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th class="derecha">Debe actualmente</th>
              <th>Último movimiento</th>
            </tr>
          </thead>
          <tbody id="lista-deudores"></tbody>
        </table>
      </div>
    </div>

    <!-- Perfil de cliente -->
    <div id="vista-perfil" hidden>
      <button class="boton boton-chico boton-gris" id="btn-volver">← Volver a la lista</button>
      <div class="tarjeta" style="margin-top:14px;">
        <h1 id="perfil-nombre" style="margin-bottom:4px;"></h1>
        <p class="suave" id="perfil-telefono" style="margin-top:0;"></p>
        <div class="pos-total" id="perfil-deuda" style="text-align:left;">
          <span class="etiqueta">Debe actualmente</span>$0.00
        </div>
        <p class="suave" id="perfil-ultimos"></p>
        <div class="pos-acciones">
          <button class="boton boton-morado" id="btn-abonar">Registrar abono</button>
          <button class="boton boton-morado" id="btn-pago-completo">Pago completo</button>
          <button class="boton boton-gris" id="btn-editar-cliente">Editar cliente</button>
        </div>
      </div>

      <div class="tarjeta">
        <h2 style="margin-top:0;">Historial de movimientos</h2>
        <table>
          <thead>
            <tr>
              <th>Fecha y hora</th>
              <th>Tipo</th>
              <th class="derecha">Monto</th>
              <th>Nota</th>
            </tr>
          </thead>
          <tbody id="lista-movimientos"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal de abono -->
  <div class="modal-fondo" id="modal-abono">
    <div class="modal">
      <h2 id="titulo-abono">Registrar abono</h2>
      <p style="font-size:1.2rem;">Debe actualmente: <strong id="abono-deuda" class="rojo"></strong></p>
      <div id="abono-monto-caja">
        <label for="abono-monto">¿Cuánto va a abonar?</label>
        <input type="number" id="abono-monto" min="0" step="0.5" placeholder="0.00">
      </div>
      <label>¿Cómo pagó?</label>
      <div class="opciones-pago">
        <button class="opcion-pago activa" data-metodo="efectivo">Efectivo</button>
        <button class="opcion-pago" data-metodo="transferencia">Transferencia</button>
      </div>
      <label for="abono-nota">Nota (opcional)</label>
      <input type="text" id="abono-nota" placeholder="Ejemplo: pagó su esposo">
      <div class="modal-acciones">
        <button class="boton boton-gris" id="btn-cancelar-abono">Cancelar</button>
        <button class="boton boton-morado" id="btn-confirmar-abono">Registrar</button>
      </div>
    </div>
  </div>

  <!-- Modal nuevo / editar cliente -->
  <div class="modal-fondo" id="modal-cliente">
    <div class="modal">
      <h2 id="titulo-cliente">Nuevo cliente</h2>
      <label for="cliente-nombre-campo">Nombre</label>
      <input type="text" id="cliente-nombre-campo" placeholder="Nombre del cliente">
      <label for="cliente-telefono-campo">Teléfono (opcional)</label>
      <input type="tel" id="cliente-telefono-campo" placeholder="Teléfono">
      <div class="modal-acciones">
        <button class="boton boton-gris" id="btn-cancelar-cliente">Cancelar</button>
        <button class="boton boton-morado" id="btn-guardar-cliente">Guardar</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/deudores.js"></script>
</body>
</html>
